services:
  - type: web
    name: f1guesserduel
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: true
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAMESITE
        value: lax
      - key: SESSION_COOKIE_NAME
        value: f1_session
      - key: SESSION_MAX_AGE_DAYS
        value: 7
      - key: SOCKET_AUTH_TOKEN_MAX_AGE_MS
        value: 120000
      - key: SESSION_CLEANUP_INTERVAL_MS
        value: 900000
      - key: ROOM_SAVE_DEBOUNCE_MS
        value: 250
      - key: PERSISTENCE_MODE
        value: ephemeral
      - key: DATABASE_PROVIDER
        value: postgres
      - key: POSTGRES_SSL
        value: true
      - key: DATABASE_URL
        sync: false
      - key: GAME_HISTORY_RETENTION_DAYS
        value: 365
      - key: GAME_HISTORY_CLEANUP_INTERVAL_MS
        value: 604800000
      - key: GAME_HISTORY_CLEANUP_BATCH_SIZE
        value: 5000
      - key: SOCKET_REDIS_ADAPTER_ENABLED
        value: false
      - key: SOCKET_RATE_LIMIT_ENABLED
        value: true
      - key: SOCKET_RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: LOG_LEVEL
        value: info
      - key: REQUEST_LOGGING_ENABLED
        value: true
      - key: DATA_DIR
        value: /tmp/f1guesserduel
      - key: PUBLIC_ORIGIN
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SOCKET_AUTH_SECRET
        sync: false
