<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" role="img" aria-labelledby="title desc">
  <title id="title">Cadillac team placeholder badge</title>
  <desc id="desc">Custom local placeholder badge for Cadillac team used by F1 Guesser Duel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9a646"/>
      <stop offset="0.35" stop-color="#f3d16b"/>
      <stop offset="0.7" stop-color="#b89135"/>
      <stop offset="1" stop-color="#f7e08b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="320" height="120" rx="26" fill="url(#bg)"/>
  <rect x="12" y="12" width="296" height="96" rx="20" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.9"/>
  <path d="M54 36h212" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <path d="M54 84h212" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <g filter="url(#shadow)">
    <text x="160" y="67" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" letter-spacing="4" fill="#f8fafc">CADILLAC</text>
    <text x="160" y="91" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="3" fill="#d1d5db">F1 TEAM</text>
  </g>
</svg>
