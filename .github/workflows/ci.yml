name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      update_visual_baselines:
        description: Regenerate the committed visual baselines in the CI environment
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test and build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22.x'
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: npm ci

      - name: Validate CI Python helpers
        run: python test/ci_backend_tests_test.py

      - name: Run tests with coverage thresholds
        id: backend_tests
        run: >-
          python scripts/ci_backend_tests.py run
          --log-file test-results/ci/backend-tests.log
          -- npm run test:coverage

      - name: Publish backend test summary
        if: always()
        env:
          TEST_EXIT_CODE: ${{ steps.backend_tests.outputs.exit_code }}
        run: >-
          python scripts/ci_backend_tests.py summary
          --log-file test-results/ci/backend-tests.log

      - name: Upload backend test log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-log-${{ github.run_attempt }}
          path: test-results/ci/backend-tests.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.run_attempt }}
          path: test-results/coverage/coverage-summary.json
          if-no-files-found: error
          retention-days: 14

      - name: Enforce backend test result
        if: always()
        env:
          TEST_EXIT_CODE: ${{ steps.backend_tests.outputs.exit_code }}
        run: python scripts/ci_backend_tests.py enforce

      - name: Build production bundles
        run: npm run build

      - name: Verify generated frontend files are committed
        run: git diff --exit-code -- public/index.html public/style.bundle.css public/game.bundle.min.js public/service-worker.js

  integration-services:
    name: Redis and PostgreSQL integration tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      TEST_REDIS_URL: redis://127.0.0.1:6379
      TEST_DATABASE_URL: postgresql://f1guesser_ci:f1guesser_ci@127.0.0.1:5432/f1guesser_ci
      TEST_POSTGRES_TOOLS_DOCKER_IMAGE: postgres:17-alpine
      TEST_POSTGRES_TOOLS_DOCKER_NETWORK: host

    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: f1guesser_ci
          POSTGRES_PASSWORD: f1guesser_ci
          POSTGRES_DB: f1guesser_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U f1guesser_ci -d f1guesser_ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run real service integration tests
        run: npm run test:integration:services

  responsive-visual:
    name: Responsive, visual and accessibility browser tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [verify, integration-services]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium with system dependencies
        run: npx playwright install --with-deps chromium

      - name: Run responsive and visual tests
        id: responsive_tests
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p test-results/browser-logs
          set -o pipefail
          npm run test:e2e:responsive 2>&1 | tee test-results/browser-logs/responsive-visual.log
        env:
          UPDATE_VISUAL_BASELINES: ${{ github.event_name == 'workflow_dispatch' && inputs.update_visual_baselines && '1' || '0' }}

      - name: Run profile and reconnection flows
        id: flow_tests
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p test-results/browser-logs
          set -o pipefail
          npm run test:e2e:flows 2>&1 | tee test-results/browser-logs/profile-reconnection.log

      - name: Run automated accessibility audit
        id: accessibility_tests
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p test-results/browser-logs
          set -o pipefail
          npm run test:e2e:accessibility 2>&1 | tee test-results/browser-logs/accessibility.log

      - name: Publish browser test summary
        if: always()
        shell: bash
        env:
          RESPONSIVE_OUTCOME: ${{ steps.responsive_tests.outcome }}
          FLOW_OUTCOME: ${{ steps.flow_tests.outcome }}
          ACCESSIBILITY_OUTCOME: ${{ steps.accessibility_tests.outcome }}
        run: |
          {
            echo "## Browser quality results"
            echo
            echo "| Suite | Result |"
            echo "| --- | --- |"
            echo "| Responsive and visual | ${RESPONSIVE_OUTCOME} |"
            echo "| Profile and reconnection | ${FLOW_OUTCOME} |"
            echo "| Accessibility | ${ACCESSIBILITY_OUTCOME} |"
            echo
            echo "Full logs are available in the browser-quality artifact."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload browser quality reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: browser-quality-${{ github.run_attempt }}
          path: |
            test-results/browser-logs/
            test-results/responsive-visual/
            test-results/accessibility/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload regenerated visual baselines
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.update_visual_baselines }}
        uses: actions/upload-artifact@v7
        with:
          name: visual-baselines-${{ github.run_attempt }}
          path: test/e2e/baselines/responsive-visual/
          if-no-files-found: error
          retention-days: 14

      - name: Enforce browser test results
        if: always()
        shell: bash
        env:
          RESPONSIVE_OUTCOME: ${{ steps.responsive_tests.outcome }}
          FLOW_OUTCOME: ${{ steps.flow_tests.outcome }}
          ACCESSIBILITY_OUTCOME: ${{ steps.accessibility_tests.outcome }}
        run: |
          failed=0
          for result in "$RESPONSIVE_OUTCOME" "$FLOW_OUTCOME" "$ACCESSIBILITY_OUTCOME"; do
            if [[ "$result" != "success" ]]; then
              failed=1
            fi
          done
          if [[ "$failed" == "1" ]]; then
            echo "::error title=Browser quality tests failed::See the job summary and browser-quality artifact for every failing suite."
          fi
          exit "$failed"
